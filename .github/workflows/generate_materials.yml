name: Generate ASIR Course Materials

on:
  workflow_dispatch:
    inputs:
      module_file:
        description: 'Module markdown file to process (e.g., asir/implantacion_de_sistemas_operativos.md). Leave empty to process all files.'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai scikit-learn pypdf

    - name: Run script for a specific module
      if: ${{ github.event.inputs.module_file != '' }}
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: 'gemini-3.1-flash-lite'
      run: python asir/generate_course_materials.py ${{ github.event.inputs.module_file }}

    - name: Run script for ALL modules
      if: ${{ github.event.inputs.module_file == '' }}
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: 'gemini-3.1-flash-lite'
      run: python asir/generate_course_materials.py --all

    - name: Commit and push generated materials
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "docs: auto-generate ASIR course materials with Gemini AI"
        file_pattern: "asir/materials/*"
