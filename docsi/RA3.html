<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contenidos del RA3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true });
    </script>
    <style>
        .markdown-content h3 { font-size: 1.25rem; font-weight: 600; color: #008037; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-content p { margin-bottom: 1rem; color: #374151; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #374151; }
        .markdown-content li { margin-bottom: 0.25rem; }
        .markdown-content strong { font-weight: 600; color: #111827; }
        .markdown-content pre { background-color: #1f2937; color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; overflow-x: auto; position: relative; }
        .markdown-content code { font-family: monospace; }
        .markdown-content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .markdown-content th, .markdown-content td { border: 1px solid #e5e7eb; padding: 0.75rem; text-align: left; }
        .markdown-content th { background-color: #f9fafb; font-weight: 600; color: #374151; }

        /* Transition for accordion */
        .accordion-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 999999px; /* Huge limit to prevent text cut-off */
            opacity: 1;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .rotate-180 { transform: rotate(180deg); }
        .copy-btn {
            position: absolute; top: 0.5rem; right: 0.5rem; background: #374151; color: white; padding: 0.2rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; cursor: pointer; border: none;
        }
        .copy-btn:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-[#F3FDE8] font-sans min-h-screen p-8 relative">
    <a href="index.html" class="absolute top-8 right-8 bg-white border border-gray-200 text-gray-700 px-4 py-2 rounded-lg shadow-sm hover:bg-gray-50 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Volver a Inicio</a>
    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-[#008037] mb-2">Contenidos del RA3</h1>
            <p class="text-gray-500 text-sm uppercase">SELECCIONA UNA SECCIÓN</p>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <a href="RA3_Teoria_rev.html" class="block bg-white rounded-xl shadow-sm border-l-8 border-[#00A859] p-8 hover:shadow-md transition-shadow">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Teoría</h2>
                    <p class="text-gray-500">Acceder al contenido de teoría para el RA3</p>
                </a>

                <a href="RA3_Practicas_rev.html" class="block bg-white rounded-xl shadow-sm border-l-8 border-[#00A859] p-8 hover:shadow-md transition-shadow">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Práctica</h2>
                    <p class="text-gray-500">Acceder al contenido de práctica para el RA3</p>
                </a>

                <a href="RA3_Evaluacion_rev.html" class="block bg-white rounded-xl shadow-sm border-l-8 border-[#00A859] p-8 hover:shadow-md transition-shadow">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Evaluación</h2>
                    <p class="text-gray-500">Acceder al contenido de evaluación para el RA3</p>
                </a>
                </div>
        </div>
    </div>

    <script>
        // Accordion Logic
        function toggleAccordion(id) {
            const content = document.getElementById('content-' + id);
            const icon = document.getElementById('icon-' + id);

            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.classList.remove('rotate-180');
            } else {
                content.classList.add('open');
                icon.classList.add('rotate-180');
            }
        }

        // Copy Code Logic
        document.querySelectorAll('pre').forEach((block) => {
            if(block.classList.contains('mermaid')) return; // skip mermaid

            const button = document.createElement('button');
            button.className = 'copy-btn';
            button.innerText = 'Copiar';
            block.appendChild(button);

            button.addEventListener('click', async () => {
                const code = block.querySelector('code').innerText;
                try {
                    await navigator.clipboard.writeText(code);
                    button.innerText = '¡Copiado!';
                    setTimeout(() => { button.innerText = 'Copiar'; }, 2000);
                } catch (err) {
                    console.error('Failed to copy', err);
                }
            });
        });
    </script>
</body>
</html>
